# Local AWS API emulation (SQS, Lambda, IAM, …). See README "Local cloud simulation".
services:
  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,lambda,iam,sts
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "0"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./local-dev/localstack-ready.d:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  localstack-data:
